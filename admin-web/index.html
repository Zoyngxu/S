<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>刷题通Pro后台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section id="loginView" class="login-shell">
        <div class="login-card">
          <p class="eyebrow">Admin Console</p>
          <h1>刷题通Pro后台</h1>
          <p class="muted">请输入管理员账号和密码。页面不保存密码，所有权限由云函数校验。</p>
          <label class="field">
            <span>管理员账号</span>
            <input id="accountInput" autocomplete="username" placeholder="请输入账号" />
          </label>
          <label class="field">
            <span>管理员密码</span>
            <input id="passwordInput" type="password" autocomplete="current-password" placeholder="请输入密码" />
          </label>
          <button id="loginBtn" class="primary-btn">登录后台</button>
          <p id="loginMsg" class="form-msg"></p>
        </div>
      </section>

      <section id="adminView" class="admin-shell hidden">
        <header class="topbar">
          <div>
            <p class="eyebrow">刷题通Pro</p>
            <h1>后台管理</h1>
          </div>
          <div class="top-actions">
            <span id="sessionText" class="session-text"></span>
            <button id="logoutBtn" class="ghost-btn">退出</button>
          </div>
        </header>

        <nav class="tabs">
          <button class="tab active" data-tab="overview">总览</button>
          <button class="tab" data-tab="users">用户</button>
          <button class="tab" data-tab="feedback">反馈</button>
          <button class="tab" data-tab="content">内容</button>
        </nav>

        <section id="overviewPanel" class="panel">
          <div id="statsGrid" class="stats-grid"></div>
        </section>

        <section id="usersPanel" class="panel hidden">
          <div class="panel-head">
            <div>
              <h2>用户管理</h2>
              <p id="userSummary" class="muted">加载中...</p>
            </div>
            <button id="refreshUsersBtn" class="ghost-btn">刷新</button>
          </div>
          <div class="filter-row">
            <button class="filter active" data-filter="all">全部用户</button>
            <button class="filter" data-filter="authorized">授权用户</button>
            <button class="filter" data-filter="todayLogin">今日登录</button>
            <button class="filter" data-filter="todayCheckIn">今日签到</button>
          </div>
          <div id="userList" class="list"></div>
          <div class="pager">
            <button id="prevUserPage" class="ghost-btn">上一页</button>
            <span id="userPageText">第 1 页</span>
            <button id="nextUserPage" class="ghost-btn">下一页</button>
          </div>
        </section>

        <section id="feedbackPanel" class="panel hidden">
          <div class="panel-head">
            <div>
              <h2>意见反馈</h2>
              <p class="muted">查看用户反馈并标记处理。</p>
            </div>
            <button id="refreshFeedbackBtn" class="ghost-btn">刷新</button>
          </div>
          <div id="feedbackList" class="list"></div>
        </section>

        <section id="contentPanel" class="panel hidden">
          <div class="panel-head">
            <div>
              <h2>内容发布</h2>
              <p class="muted">发布通知公告和作者的话。</p>
            </div>
            <button id="refreshContentBtn" class="ghost-btn">刷新</button>
          </div>
          <div class="editor-grid">
            <label class="field">
              <span>通知公告</span>
              <textarea id="noticeInput" rows="8" placeholder="输入通知公告"></textarea>
            </label>
            <label class="field">
              <span>作者的话</span>
              <textarea id="authorInput" rows="8" placeholder="输入作者的话"></textarea>
            </label>
          </div>
          <div class="button-row">
            <button id="saveNoticeBtn" class="primary-btn">发布公告</button>
            <button id="saveAuthorBtn" class="primary-btn">发布作者的话</button>
          </div>
        </section>
      </section>
    </main>

    <div id="userModal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-head">
          <div>
            <h2 id="modalUserName">用户管理</h2>
            <p id="modalUserMeta" class="muted"></p>
          </div>
          <button id="closeModalBtn" class="icon-btn">×</button>
        </div>
        <div class="modal-body">
          <div class="box">
            <h3>积分调整</h3>
            <div class="grid-two">
              <label class="field">
                <span>变动积分</span>
                <input id="pointDeltaInput" type="number" placeholder="例如 10 或 -5" />
              </label>
              <label class="field">
                <span>调整原因</span>
                <input id="pointReasonInput" placeholder="例如 活动奖励" />
              </label>
            </div>
            <button id="adjustPointsBtn" class="primary-btn">确认调整积分</button>
          </div>
          <div class="box">
            <h3>授权管理</h3>
            <label class="field">
              <span>授权天数</span>
              <input id="membershipDaysInput" type="number" placeholder="留空或0为长期" />
            </label>
            <div class="button-row">
              <button id="setProBtn" class="primary-btn">设为授权用户</button>
              <button id="setFreeBtn" class="danger-btn">取消授权</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="./config.js"></script>
    <script src="https://imgcache.qq.com/qcloud/tcbjs/1.10.8/tcb.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
